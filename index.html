<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fisher Til I Die</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F1F3EE;
    --paper-raised: #FFFFFF;
    --ink: #202125;
    --ink-soft: #5B5F5A;
    --seal: #B23A2E;
    --seal-dark: #8E2E24;
    --line: #C9D0C4;
    --bot-bubble: #E7EBE2;
    --focus: #3E6B57;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(178,58,46,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(62,107,87,0.06), transparent 45%),
      var(--paper);
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .sheet{
    width:100%;
    max-width:640px;
    height:min(760px, 92vh);
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow: 0 1px 0 var(--paper-raised), 0 18px 40px -20px rgba(32,33,37,0.25);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  .sheet::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0; height:6px;
    background:repeating-linear-gradient(45deg, var(--seal) 0 8px, var(--seal-dark) 8px 16px);
    opacity:0.9;
  }
  header{
    padding:22px 32px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:14px;
  }
  header .crest{
    width:46px;
    height:46px;
    flex-shrink:0;
    border-radius:50%;
  }
  header .heading-block{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  header .title{
    font-family:'Newsreader', serif;
    font-size:24px;
    font-weight:600;
    letter-spacing:0.2px;
    line-height:1.1;
  }
  header .byline{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    letter-spacing:0.6px;
  }
  header .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:1.2px;
    align-self:flex-start;
  }
  .log{
    flex:1;
    overflow-y:auto;
    padding:24px 32px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .entry{
    display:flex;
    flex-direction:column;
    max-width:82%;
    animation: rise 0.25s ease-out;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .entry.user{ align-self:flex-end; align-items:flex-end; }
  .entry.bot{ align-self:flex-start; align-items:flex-start; }
  .stamp-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--ink-soft);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .stamp-label::before{
    content:"";
    width:6px; height:6px;
    border-radius:50%;
    background:var(--seal);
    display:inline-block;
  }
  .entry.bot .stamp-label::before{ background:var(--focus); }
  .bubble{
    padding:14px 16px;
    border-radius:2px;
    line-height:1.55;
    font-size:15px;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .entry.user .bubble{
    background:var(--seal);
    color:#FBF1EE;
    border-top-right-radius:0;
  }
  .entry.bot .bubble{
    background:var(--bot-bubble);
    color:var(--ink);
    border-top-left-radius:0;
    border:1px solid var(--line);
  }
  .typing{
    display:flex;
    gap:4px;
    padding:14px 16px;
  }
  .typing span{
    width:6px; height:6px;
    background:var(--ink-soft);
    border-radius:50%;
    display:inline-block;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{
    0%,60%,100%{ transform:translateY(0); opacity:0.4; }
    30%{ transform:translateY(-4px); opacity:1; }
  }
  .composer{
    border-top:1px solid var(--line);
    padding:18px 24px 22px;
    display:flex;
    gap:10px;
    align-items:flex-end;
    background:var(--paper-raised);
  }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--line);
    border-radius:2px;
    padding:12px 14px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:15px;
    line-height:1.4;
    max-height:140px;
    background:var(--paper);
    color:var(--ink);
  }
  textarea:focus{
    outline:none;
    border-color:var(--focus);
    box-shadow:0 0 0 3px rgba(62,107,87,0.15);
  }
  button.send{
    width:52px; height:44px;
    border:none;
    border-radius:2px;
    background:var(--seal);
    color:#FBF1EE;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: background 0.15s ease, transform 0.1s ease;
    flex-shrink:0;
  }
  button.send:hover:not(:disabled){ background:var(--seal-dark); }
  button.send:active:not(:disabled){ transform:scale(0.96); }
  button.send:disabled{ background:var(--line); cursor:not-allowed; color:var(--ink-soft); }
  .log::-webkit-scrollbar{ width:8px; }
  .log::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .error-note{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--seal-dark);
    padding:0 32px 12px;
  }
  @media (prefers-reduced-motion: reduce){
    .entry{ animation:none; }
    .typing span{ animation:none; opacity:0.7; }
  }
</style>
</head>
<body>

<div class="sheet">
  <header>
    <img class="crest" id="crestImg" alt="Fisher FC crest" src="">
    <div class="heading-block">
      <div class="title">Fisher Til I Die</div>
      <div class="byline">with Peter, 61 &middot; Bermondsey born &amp; bred &middot; heat technician</div>
    </div>
    <div class="meta" id="dateline"></div>
  </header>

  <div class="log" id="log">
    <div class="entry bot">
      <div class="stamp-label">received</div>
      <div class="bubble">Alright mate. Peter here — just got in from a job, kettle's on. Ask us anything, though fair warning, it'll end up back at the Fish one way or another.</div>
    </div>
  </div>

  <div class="error-note" id="errorNote" style="display:none;"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Say something, mate..." aria-label="Message"></textarea>
    <button class="send" id="sendBtn" aria-label="Send">SEND</button>
  </div>
</div>

  document.getElementById('crestImg').src = 'data:image/png;base64,' + CREST_B64;

  let history = [];
  let isSending = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function addEntry(role, text){
    const entry = document.createElement('div');
    entry.className = 'entry ' + (role === 'user' ? 'user' : 'bot');
    const label = document.createElement('div');
    label.className = 'stamp-label';
    label.textContent = role === 'user' ? 'sent' : 'received';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    entry.appendChild(label);
    entry.appendChild(bubble);
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  function addTyping(){
    const entry = document.createElement('div');
    entry.className = 'entry bot';
    entry.id = 'typingEntry';
    const label = document.createElement('div');
    label.className = 'stamp-label';
    label.textContent = 'writing';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    entry.appendChild(label);
    entry.appendChild(bubble);
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  function removeTyping(){
    const el = document.getElementById('typingEntry');
    if(el) el.remove();
  }

  async function send(){
    const text = input.value.trim();
    if(!text || isSending) return;

    errorNote.style.display = 'none';
    isSending = true;
    sendBtn.disabled = true;

    addEntry('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    input.style.height = 'auto';

    addTyping();

    try{
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-5",
          max_tokens: 1000,
          system: "You are Peter, 61 years old, born and bred in Bermondsey/Rotherhithe, southeast London. You work as a heat technician (gas and heating engineer) — you've been in the trade for decades and aren't afraid to bring up a boiler analogy now and then. You are a die-hard, lifelong supporter of Fisher FC, the football club based in Rotherhithe, Southwark. The club is the single most important thing in your life outside your family and your work van. You talk like a real terrace regular: warm, blokey, southeast London vernacular ('mate', 'know what I mean', 'proper', etc — used naturally, not overdone), fiercely loyal, a bit obsessive, with dry humour about the realities of non-league football life.\n\nFACTS YOU KNOW ABOUT THE CLUB (use these accurately, don't invent extra facts you're unsure of):\n- Fisher FC was established in 2009, formed by supporters after the old Fisher Athletic FC was wound up by the High Court on 13 May 2009 over unpaid tax.\n- The lineage traces back to 1908, when the Fisher Catholic Club for Boys was founded by Norman Potter (aided by Michael Culliton, headmaster of Dockhead School, Bermondsey) to give underprivileged boys sporting facilities. It was named after St John Fisher, a Catholic bishop executed under Henry VIII, and backed by the Fisher Society, a Cambridge University Catholic society.\n- Nickname: 'The Fish'.\n- After reforming in 2009, the new Fisher FC played home games at Dulwich Hamlet's Champion Hill ground, since they no longer owned a Rotherhithe stadium.\n- In 2013-2014 the club worked with developer Fairview New Homes and Southwark Council to build a new stadium on the St Paul's playing fields site on Salter Road, Rotherhithe. Southwark Council approved the plans on 1 July 2014.\n- The club returned home to Rotherhithe in 2016, playing at St Paul's Sports Ground on Salter Road — a proud moment after over a decade away (Fisher Athletic had left Rotherhithe for East Dulwich back in 2004).\n- The club currently plays in the Southern Counties East League (SCEL) Premier Division, a step 6 non-league level.\n- Home colours are traditionally black and white, as with the historic Fisher Athletic.\n- The area's football roots run deep — Rotherhithe and Bermondsey have a strong working-class football heritage, and Fisher has always been a community club rather than a big-money operation.\n\nLIVE INFORMATION: You have access to real-time web search. Use it whenever someone asks about anything current — recent or upcoming Fisher FC results and fixtures, league position, squad news, or general current events/questions they raise. As a genuine supporter, you should actively search for real fixture and result info when it's relevant rather than guessing. Don't invent scores or news — search for it, and if you can't find something, say so honestly like a fan who's out of the loop would.\n\nPERSONALITY RULES:\n- No matter what the person asks about — the weather, cooking, their job, world news, anything — find a genuine, natural way to steer the conversation back to Fisher FC. Draw a comparison, make an analogy, or just can't help yourself mentioning the Fish.\n- Occasionally, naturally, let a bit of Peter's actual life show through (the van, a job he did that morning, his mates from the terrace) without making every message about that.\n- Keep replies conversational, enthusiastic, and not overly long — like a mate down the pub, not an encyclopedia entry.",
          tools: [
            { type: "web_search_20250305", name: "web_search" }
          ],
          messages: history
        })
      });

      if(!response.ok){
        throw new Error('The letter did not arrive (status ' + response.status + ').');
      }

      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text);
      const replyText = textBlocks.join('\n').trim() || "(No reply came through — try again.)";

      removeTyping();
      addEntry('bot', replyText);
      history.push({ role: 'assistant', content: replyText });

    }catch(err){
      removeTyping();
      errorNote.style.display = 'block';
      errorNote.textContent = 'Delivery failed: ' + err.message;
      history.pop();
    }finally{
      isSending = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
